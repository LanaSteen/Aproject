@if(profileObj){
 <div class="profile">
    <img [src]="profileObj.avatar" alt="">
    <p>{{profileObj.firstName}}</p>
    <p>{{profileObj.lastName}}</p>
    <p>{{profileObj.age}}</p>
    <p>{{profileObj.phone}}</p>
    <p>{{profileObj.email}}</p>


</div>
}

<app-fogort [email]="profileObj.email" [changeOrdForgot]="'change'"></app-fogort>

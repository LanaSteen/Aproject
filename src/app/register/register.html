<p>register works!</p>




<form [formGroup]="myRegisterForm" (ngSubmit)="register()">

   <input type="text" formControlName="firstName"  required  placeholder="First Name">
   <input type="text" formControlName="lastName" placeholder="Last Name" >
   <input type="number" formControlName="age"  placeholder="Age">
   <input type="email" formControlName="email" email placeholder="Email" >
   <input type="password" formControlName="password" pattern=""  placeholder="Password" >
   <input type="text" formControlName="address"  placeholder="Address" >
   <input type="text" formControlName="phone"  placeholder="Phone" >
   <input type="text" formControlName="zipcode" placeholder="Zipcode"  >
   <input type="text" formControlName="avatar" placeholder="Avatar" >
   <select formControlName="gender">
      <option value="MALE">Male</option>
      <option value="FEMALE">Female</option>
   </select>

   <button [disabled]="!myRegisterForm.valid">Register</button>




</form>
